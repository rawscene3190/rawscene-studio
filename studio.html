<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Studio | RAWSCENE</title>

    <meta
        name="description"
        content="RAWSCENE의 실내 공간, 오브제, 출입구 및 야외 촬영 공간을 확인해보세요."
    >

    <link rel="stylesheet" href="rawscene-editorial.css">
</head>

<body>

<header class="header">
    <a class="logo" href="index.html">RAWSCENE</a>

    <nav class="nav" aria-label="주요 메뉴">
        <a href="studio.html" aria-current="page">Studio</a>
        <a href="archive.html">Archive</a>
        <a href="info.html">Info</a>
        <a href="schedule.html">Schedule</a>
        <a href="reservation.html">Reservation</a>
    </nav>
</header>

<main class="studio-gallery-page">

    <section class="studio-gallery-heading">
        <p class="studio-gallery-label">STUDIO</p>
        <h1>RAWSCENE SPACE</h1>

        <p class="studio-gallery-description">
            패션, 제품, 브랜드 콘텐츠 촬영을 위한 RAWSCENE의 공간을 확인해보세요.
        </p>
    </section>

    <section class="studio-gallery" aria-label="RAWSCENE 공간 갤러리">

        <!-- 01. 메인 대표 사진 -->
        <figure class="gallery-item gallery-item-wide">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="0"
                aria-label="메인 공간 사진 크게 보기"
            >
                <img
                    src="images/gallery-01.jpg"
                    alt="RAWSCENE 스튜디오 메인 공간 전경"
                    loading="eager"
                >
            </button>
        </figure>

        <!-- 02. 내부 전경 1 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="1"
                aria-label="내부 공간 사진 1 크게 보기"
            >
                <img
                    src="images/gallery-02.jpg"
                    alt="RAWSCENE 내부 공간 전경 1"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 03. 내부 전경 2 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="2"
                aria-label="내부 공간 사진 2 크게 보기"
            >
                <img
                    src="images/gallery-03.jpg"
                    alt="RAWSCENE 내부 공간 전경 2"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 04. 내부 오브제 1 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="3"
                aria-label="내부 오브제 사진 1 크게 보기"
            >
                <img
                    src="images/gallery-04.jpg"
                    alt="RAWSCENE 내부 공간과 오브제 1"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 05. 내부 오브제 2 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="4"
                aria-label="내부 오브제 사진 2 크게 보기"
            >
                <img
                    src="images/gallery-05.jpg"
                    alt="RAWSCENE 내부 공간과 오브제 2"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 06. 내부 오브제 3 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="5"
                aria-label="내부 오브제 사진 3 크게 보기"
            >
                <img
                    src="images/gallery-06.jpg"
                    alt="RAWSCENE 내부 공간과 오브제 3"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 07. 내부 오브제 4 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="6"
                aria-label="내부 오브제 사진 4 크게 보기"
            >
                <img
                    src="images/gallery-07.jpg"
                    alt="RAWSCENE 내부 공간과 오브제 4"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 08. 야외 출입구 -->
        <figure class="gallery-item gallery-item-wide">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="7"
                aria-label="야외 출입구 사진 크게 보기"
            >
                <img
                    src="images/gallery-08.jpg"
                    alt="RAWSCENE 야외 출입구"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 09. 야외 공간 1 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="8"
                aria-label="야외 공간 사진 1 크게 보기"
            >
                <img
                    src="images/gallery-09.jpg"
                    alt="RAWSCENE 야외 촬영 공간 1"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 10. 야외 공간 2 -->
        <figure class="gallery-item">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="9"
                aria-label="야외 공간 사진 2 크게 보기"
            >
                <img
                    src="images/gallery-10.jpg"
                    alt="RAWSCENE 야외 촬영 공간 2"
                    loading="lazy"
                >
            </button>
        </figure>

        <!-- 11. 야외 공간 3 -->
        <figure class="gallery-item gallery-item-wide">
            <button
                class="gallery-button"
                type="button"
                data-gallery-index="10"
                aria-label="야외 공간 사진 3 크게 보기"
            >
                <img
                    src="images/gallery-11.jpg"
                    alt="RAWSCENE 야외 촬영 공간 3"
                    loading="lazy"
                >
            </button>
        </figure>

    </section>

    <section class="reservation-banner">
        <div>
            <span>BOOK NOW</span>
            <h2>Check Schedule.</h2>
            <p>촬영 전 스케줄을 확인하고 원하는 날짜로 예약해주세요.</p>
        </div>

        <a href="schedule.html">Schedule</a>
    </section>

</main>

<div
    class="gallery-lightbox"
    id="galleryLightbox"
    role="dialog"
    aria-modal="true"
    aria-label="사진 크게 보기"
    aria-hidden="true"
>
    <button
        class="lightbox-close"
        type="button"
        aria-label="사진 닫기"
    >
        ×
    </button>

    <button
        class="lightbox-arrow lightbox-prev"
        type="button"
        aria-label="이전 사진"
    >
        ‹
    </button>

    <div class="lightbox-image-wrap">
        <img
            class="lightbox-image"
            src=""
            alt=""
        >

        <p class="lightbox-counter" aria-live="polite"></p>
    </div>

    <button
        class="lightbox-arrow lightbox-next"
        type="button"
        aria-label="다음 사진"
    >
        ›
    </button>
</div>

<footer class="footer">
    <div class="footer-left">
        <h3>RAWSCENE</h3>
    </div>

    <div class="footer-right">
        <p>경기 남양주시 다산순환로 20 현대프리미엄캠퍼스몰 D118</p>
        <p>Studio · Archive · Schedule · Reservation</p>
    </div>
</footer>

<script src="rawscene-editorial.js"></script>

</body>
</html>
